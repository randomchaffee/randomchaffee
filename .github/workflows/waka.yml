name: Waka Readme

on:
  schedule:
    # 4:00 PM UTC = 12:00 AM Manila Time
    - cron: '0 16 * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  update-readme:
    name: Update Readme with Metrics
    runs-on: ubuntu-latest
    permissions:
      contents: write # Gives the bot permission to edit your README
    
    steps:
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SHOW_TITLE: true
          SECTION_NAME: "waka"
          # This tells the action to use the GitHub Actions Bot identity
          COMMIT_MESSAGE: "Updated WakaTime Stats [skip ci]"
          TARGET_BRANCH: main
          TARGET_PATH: README.md